name: Package Validation

on:
  pull_request:
  push:
    branches: [main]

jobs:
  package-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v3
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun run publint
      - run: bun run attw
