name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v3
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run lint
      - run: bun test
      - run: bun run build
      - run: bun run test:protocol
      - run: bun run test:fixtures
      - run: bun run publint
      - run: bun run attw
