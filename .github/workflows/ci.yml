name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-24.04
    outputs:
      docs-only: ${{ steps.filter.outputs.docs-only }}
      run-all: ${{ steps.filter.outputs.run-all }}
      run-package: ${{ steps.filter.outputs.run-package }}
      run-protocol: ${{ steps.filter.outputs.run-protocol }}
      run-real-local: ${{ steps.filter.outputs.run-real-local }}
      run-ui: ${{ steps.filter.outputs.run-ui }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: filter
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
            if [[ "$base" =~ ^0+$ ]]; then
              base="$(git rev-list --max-parents=0 "$head")"
            fi
          fi

          git diff --name-only "$base" "$head" > "$RUNNER_TEMP/changed-files.txt"

          node <<'NODE'
          import { appendFileSync, readFileSync } from "node:fs";
          import { join } from "node:path";

          const files = readFileSync(join(process.env.RUNNER_TEMP, "changed-files.txt"), "utf8")
            .split(/\r?\n/)
            .filter(Boolean);

          const matches = (patterns) => files.some((file) => patterns.some((pattern) => pattern.test(file)));
          const docsOnly = files.length > 0 && files.every((file) =>
            /^(README\.md|ROADMAP\.md|docs\/|\.agents\/skills\/.*\.md|skills\/agent-ui\/.*\.md)$/.test(file),
          );
          const rootOrWorkflow = matches([
            /^\.github\/workflows\//,
            /^package\.json$/,
            /^bun\.lock$/,
            /^tsconfig/,
            /^vitest\.config\.ts$/,
            /^playwright\..*\.config\.ts$/,
            /^scripts\//,
            /^\.changeset\//,
          ]);
          const packageRelated = rootOrWorkflow || matches([
            /^packages\/[^/]+\/package\.json$/,
            /^packages\/[^/]+\/src\//,
            /^packages\/[^/]+\/(README|CHANGELOG)\.md$/,
            /^test\/(api-snapshot|packlist|package|runtime|npm-release|prepare-npm)/,
          ]);
          const protocolRelated = rootOrWorkflow || matches([
            /^packages\/codex\//,
            /^packages\/core\//,
            /^fixtures\/app-server\//,
            /^third_party\/codex$/,
            /^test\/.*protocol/,
          ]);
          const uiRelated = rootOrWorkflow || matches([
            /^packages\/react\//,
            /^packages\/web-components\//,
            /^examples\/local-react-vite\//,
            /^playwright\.fixtures\.config\.ts$/,
          ]);
          const realLocalRelated = rootOrWorkflow || matches([
            /^packages\/codex\//,
            /^packages\/core\//,
            /^packages\/server\//,
            /^examples\/codex-local-web\//,
            /^playwright\.real-local\.config\.ts$/,
            /^scripts\/(clean-e2e-ports|real-codex-smoke|real-local-web-layout-audit)\.mjs$/,
          ]);

          const outputs = {
            "docs-only": docsOnly ? "true" : "false",
            "run-all": !docsOnly && rootOrWorkflow ? "true" : "false",
            "run-package": !docsOnly && packageRelated ? "true" : "false",
            "run-protocol": !docsOnly && protocolRelated ? "true" : "false",
            "run-real-local": !docsOnly && realLocalRelated ? "true" : "false",
            "run-ui": !docsOnly && uiRelated ? "true" : "false",
          };
          appendFileSync(process.env.GITHUB_OUTPUT, Object.entries(outputs).map(([key, value]) => `${key}=${value}`).join("\n") + "\n");
          NODE

  policy:
    name: Repository policy
    runs-on: ubuntu-24.04
    needs: changes
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: bunx vitest run test/ci-workflow-policy.test.ts test/package-scripts-docs.test.ts test/npm-release-readiness.test.ts test/repository-skills.test.ts test/e2e-workflow-gate.test.ts test/e2e-script-config.test.ts

  typecheck:
    name: Typecheck
    runs-on: ubuntu-24.04
    needs: changes
    if: needs.changes.outputs.docs-only != 'true'
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    needs: changes
    if: needs.changes.outputs.docs-only != 'true'
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: bun run lint

  unit:
    name: Unit tests
    runs-on: ubuntu-24.04
    needs: changes
    if: needs.changes.outputs.docs-only != 'true'
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: bun run test

  protocol-fixtures:
    name: Protocol and fixtures
    runs-on: ubuntu-24.04
    needs: changes
    if: needs.changes.outputs.run-all == 'true' || needs.changes.outputs.run-protocol == 'true'
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: bun run validate:protocol

  package-validation:
    name: Package validation
    runs-on: ubuntu-24.04
    needs: changes
    if: needs.changes.outputs.run-all == 'true' || needs.changes.outputs.run-package == 'true'
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - name: Validate packages
        shell: bash
        run: |
          set -o pipefail
          bun run validate:packages 2>&1 | tee package-validation.log
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: package-validation-${{ github.run_id }}
          path: package-validation.log
          if-no-files-found: ignore

  api-snapshots:
    name: API snapshots
    runs-on: ubuntu-24.04
    needs: changes
    if: needs.changes.outputs.run-all == 'true' || needs.changes.outputs.run-package == 'true' || needs.changes.outputs.run-protocol == 'true'
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: bun run build:packages
      - run: bun run test:api-snapshots

  package-resolution:
    name: Package resolution
    runs-on: ubuntu-24.04
    needs: changes
    if: needs.changes.outputs.run-all == 'true' || needs.changes.outputs.run-package == 'true'
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - name: Package resolution smoke
        shell: bash
        run: |
          set -o pipefail
          bun run test:package-resolution 2>&1 | tee package-resolution.log
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: package-resolution-${{ github.run_id }}
          path: package-resolution.log
          if-no-files-found: ignore

  playwright-fixtures:
    name: Playwright fixtures
    runs-on: ubuntu-24.04
    needs: changes
    if: needs.changes.outputs.run-all == 'true' || needs.changes.outputs.run-ui == 'true'
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-playwright-
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium
      - run: bun run test:e2e:fixtures
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-fixtures-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore

  real-local-smoke:
    name: Real local smoke
    runs-on: ubuntu-24.04
    needs: changes
    if: needs.changes.outputs.run-all == 'true' || needs.changes.outputs.run-real-local == 'true'
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-playwright-
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium
      - run: bun run test:e2e:real-local
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: real-local-smoke-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
