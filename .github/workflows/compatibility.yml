name: Compatibility

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: compatibility-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect compatibility changes
    runs-on: ubuntu-24.04
    outputs:
      run-compatibility: ${{ steps.filter.outputs.run-compatibility }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: filter
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
            if [[ "$base" =~ ^0+$ ]]; then
              base="$(git rev-list --max-parents=0 "$head")"
            fi
          fi

          git diff --name-only "$base" "$head" > "$RUNNER_TEMP/changed-files.txt"

          node <<'NODE'
          import { appendFileSync, readFileSync } from "node:fs";
          import { join } from "node:path";

          const files = readFileSync(join(process.env.RUNNER_TEMP, "changed-files.txt"), "utf8")
            .split(/\r?\n/)
            .filter(Boolean);
          const compatibilityPatterns = [
            /^\.github\/workflows\/compatibility\.yml$/,
            /^package\.json$/,
            /^bun\.lock$/,
            /^tsconfig/,
            /^packages\/[^/]+\/package\.json$/,
            /^packages\/[^/]+\/src\//,
            /^packages\/[^/]+\/tsconfig/,
            /^packages\/[^/]+\/tsup\.config\.ts$/,
            /^scripts\/(node-compat|package-resolution|public-package-surface|prepare-npm-publish|publish-npm-packages)/,
          ];
          const runCompatibility = files.some((file) =>
            compatibilityPatterns.some((pattern) => pattern.test(file)),
          );
          appendFileSync(process.env.GITHUB_OUTPUT, `run-compatibility=${runCompatibility ? "true" : "false"}\n`);
          NODE

  node-lts:
    name: Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-24.04
    needs: changes
    if: needs.changes.outputs.run-compatibility == 'true'
    strategy:
      fail-fast: false
      matrix:
        node-version: [22.x, 24.x]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: bun run build:packages
      - run: bun run test:node-compat

  pnpm-smoke:
    name: pnpm workspace smoke
    runs-on: ubuntu-24.04
    needs: changes
    if: needs.changes.outputs.run-compatibility == 'true'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22.x
      - run: npm install -g pnpm@10.15.0
      - run: pnpm install --lockfile=false
      - run: pnpm --filter @nyosegawa/agent-ui-core build
