name: Compatibility

on:
  pull_request:
  push:
    branches: [main]

jobs:
  node-lts:
    name: Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x, 24.x]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: node scripts/node-compat-smoke.mjs

  pnpm-smoke:
    name: pnpm workspace smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22.x
      - run: corepack enable
      - run: pnpm install --lockfile=false
        env:
          COREPACK_ENABLE_STRICT: 0
      - run: pnpm --filter @nyosegawa/agent-ui-core build
        env:
          COREPACK_ENABLE_STRICT: 0
