name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: github.repository == 'nyosegawa/agent-ui'
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium
      - run: bun run validate:release
      - run: bun run validate:e2e
      - uses: changesets/action@v1
        with:
          publish: node scripts/prepare-npm-publish-manifests.mjs && bunx changeset publish
          version: bunx changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.CHANGESETS_GITHUB_TOKEN || github.token }}
          NPM_CONFIG_PROVENANCE: true
          NPM_TOKEN: ${{ env.NPM_TOKEN }}
