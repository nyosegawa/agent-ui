name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      mode:
        description: "Create or update the Changesets version PR."
        required: true
        type: choice
        options:
          - prepare

permissions:
  contents: read

concurrency:
  group: release-npm
  cancel-in-progress: false

jobs:
  check-release:
    name: Check release targets
    if: github.repository == 'nyosegawa/agent-ui'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      should_publish: ${{ steps.targets.outputs.should_publish }}
      unpublished_count: ${{ steps.targets.outputs.unpublished_count }}
      package_names: ${{ steps.targets.outputs.package_names }}
      versions: ${{ steps.targets.outputs.versions }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - id: targets
        name: Compare local package versions to npm
        run: node scripts/check-release-targets.mjs

  validate-release:
    name: Validate release
    needs: [check-release]
    if: >-
      always()
      && github.repository == 'nyosegawa/agent-ui'
      && (
        github.event_name == 'workflow_dispatch'
        || needs.check-release.outputs.should_publish == 'true'
      )
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-playwright-
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium
      - name: Release validation
        shell: bash
        run: |
          set -o pipefail
          bun run validate:release 2>&1 | tee release-validation.log
      - name: Release e2e validation
        shell: bash
        run: |
          set -o pipefail
          bun run validate:e2e 2>&1 | tee release-e2e.log
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: release-validation-${{ github.run_id }}
          path: |
            release-validation.log
            release-e2e.log
            playwright-report/
            test-results/
          if-no-files-found: ignore

  prepare-version-pr:
    name: Prepare version PR
    needs: validate-release
    if: github.repository == 'nyosegawa/agent-ui' && github.event_name == 'workflow_dispatch' && inputs.mode == 'prepare'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - uses: changesets/action@v1
        with:
          version: bunx changeset version
          title: Release Agent UI packages
          commit: Release Agent UI packages
        env:
          GITHUB_TOKEN: ${{ secrets.CHANGESETS_GITHUB_TOKEN || github.token }}

  publish:
    name: Publish npm packages
    needs: [check-release, validate-release]
    if: >-
      github.repository == 'nyosegawa/agent-ui'
      && github.event_name == 'push'
      && needs.check-release.outputs.should_publish == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - name: Ensure release commit is versioned
        shell: bash
        run: |
          set -euo pipefail
          if compgen -G ".changeset/*.md" > /dev/null; then
            echo "Unversioned changesets remain. Merge a reviewed Changesets version PR before publishing." >&2
            exit 1
          fi
      - uses: changesets/action@v1
        with:
          publish: bun run release:publish
        env:
          GITHUB_TOKEN: ${{ secrets.CHANGESETS_GITHUB_TOKEN || github.token }}
          NPM_CONFIG_PROVENANCE: true
          NPM_TOKEN: ${{ env.NPM_TOKEN }}
      - name: Create GitHub releases
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.CHANGESETS_GITHUB_TOKEN || github.token }}
          PACKAGE_NAMES: ${{ needs.check-release.outputs.package_names }}
        run: |
          set -euo pipefail
          for package_name in $PACKAGE_NAMES; do
            version="$(node -p "require('./packages/${package_name##*/agent-ui-}/package.json').version")"
            tag="${package_name}@${version}"
            if gh release view "$tag" >/dev/null 2>&1; then
              echo "GitHub release $tag already exists"
            else
              gh release create "$tag" --title "$tag" --generate-notes
            fi
          done
      - name: Post-publish smoke
        run: node scripts/post-publish-smoke.mjs
