name: Release

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Choose prepare to create/update the Changesets version PR, or publish to publish an already-versioned release."
        required: true
        type: choice
        options:
          - prepare
          - publish

permissions:
  contents: read

concurrency:
  group: release-npm
  cancel-in-progress: false

jobs:
  validate-release:
    name: Validate release
    if: github.repository == 'nyosegawa/agent-ui'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-playwright-
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium
      - name: Release validation
        shell: bash
        run: |
          set -o pipefail
          bun run validate:release 2>&1 | tee release-validation.log
      - name: Release e2e validation
        shell: bash
        run: |
          set -o pipefail
          bun run validate:e2e 2>&1 | tee release-e2e.log
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: release-validation-${{ github.run_id }}
          path: |
            release-validation.log
            release-e2e.log
            playwright-report/
            test-results/
          if-no-files-found: ignore

  prepare-version-pr:
    name: Prepare version PR
    needs: validate-release
    if: github.repository == 'nyosegawa/agent-ui' && inputs.mode == 'prepare'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - uses: changesets/action@v1
        with:
          version: bunx changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.CHANGESETS_GITHUB_TOKEN || github.token }}

  publish:
    name: Publish npm packages
    needs: validate-release
    if: github.repository == 'nyosegawa/agent-ui' && inputs.mode == 'publish'
    runs-on: ubuntu-24.04
    environment: npm-release
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - name: Ensure release commit is versioned
        shell: bash
        run: |
          set -euo pipefail
          if compgen -G ".changeset/*.md" > /dev/null; then
            echo "Unversioned changesets remain. Run the release workflow in prepare mode and merge the version PR before publishing." >&2
            exit 1
          fi
      - uses: changesets/action@v1
        with:
          publish: bun run release:publish
        env:
          GITHUB_TOKEN: ${{ secrets.CHANGESETS_GITHUB_TOKEN || github.token }}
          NPM_CONFIG_PROVENANCE: true
          NPM_TOKEN: ${{ env.NPM_TOKEN }}
