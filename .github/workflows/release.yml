name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: github.repository == 'nyosegawa/agent-ui'
    runs-on: ubuntu-latest
    env:
      CHANGESETS_GITHUB_TOKEN: ${{ secrets.CHANGESETS_GITHUB_TOKEN }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bun run validate:release
      - uses: changesets/action@v1
        if: env.CHANGESETS_GITHUB_TOKEN != ''
        with:
          publish: bunx changeset publish --provenance
          version: bunx changeset version
        env:
          GITHUB_TOKEN: ${{ env.CHANGESETS_GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
          NPM_TOKEN: ${{ env.NPM_TOKEN }}
      - if: env.CHANGESETS_GITHUB_TOKEN == ''
        run: |
          echo "Skipping Changesets PR/publish because CHANGESETS_GITHUB_TOKEN is not configured."
          echo "Validation completed; configure a PAT with pull request write access to enable release automation."
